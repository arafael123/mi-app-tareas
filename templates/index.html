<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor de Tareas</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .input-group {
            display: flex;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            margin-left: 8px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add {
            background: #4CAF50;
            color: white;
        }

        .btn-add:hover {
            background: #45a049;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        li:hover {
            transform: scale(1.02);
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .actions button {
            margin-left: 5px;
        }

        .btn-complete {
            background: #2196F3;
            color: white;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-complete:hover {
            background: #1976D2;
        }

        .btn-delete:hover {
            background: #d32f2f;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>🚀 Mis Tareas</h1>

    <div class="input-group">
        <input id="taskInput" placeholder="Escribe una tarea...">
        <button class="btn-add" onclick="addTask()">Agregar</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>

async function loadTasks() {
    const res = await fetch('/tasks');
    const tasks = await res.json();

    const list = document.getElementById('taskList');
    list.innerHTML = '';

    tasks.forEach(task => {
        const li = document.createElement('li');

        if (task.completed) {
            li.classList.add('completed');
        }

        li.innerHTML = `
            <span>${task.title}</span>
            <div class="actions">
                <button class="btn-complete" onclick="completeTask(${task.id})">✔</button>
                <button class="btn-delete" onclick="deleteTask(${task.id})">❌</button>
            </div>
        `;

        list.appendChild(li);
    });
}

async function addTask() {
    const input = document.getElementById('taskInput');

    if (input.value.trim() === '') {
        alert('Escribe una tarea');
        return;
    }

    await fetch('/tasks', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title: input.value})
    });

    input.value = '';
    loadTasks();
}

async function completeTask(id) {
    await fetch('/tasks/' + id, {method: 'PUT'});
    loadTasks();
}

async function deleteTask(id) {
    await fetch('/tasks/' + id, {method: 'DELETE'});
    loadTasks();
}

loadTasks();

</script>

</body>
</html>
